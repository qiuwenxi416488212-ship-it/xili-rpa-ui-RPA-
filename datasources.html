<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 数据源库 - 犀利RPA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(255,255,255,0.05);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: #ffd700; font-size: 24px; }
        .back-btn {
            padding: 10px 20px;
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        .container { padding: 30px 40px; max-width: 1400px; margin: 0 auto; }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-box .value { font-size: 28px; color: #ffd700; font-weight: bold; }
        .stat-box .label { font-size: 12px; color: #888; margin-top: 5px; }
        
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filter-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #888;
            cursor: pointer;
            font-size: 13px;
        }
        .filter-btn:hover, .filter-btn.active {
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            border-color: #ffd700;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
        }
        .card:hover {
            border-color: rgba(255,215,0,0.5);
            transform: translateY(-3px);
        }
        .card .name { font-size: 16px; color: #fff; margin-bottom: 8px; }
        .card .category { 
            font-size: 11px; 
            color: #ffd700; 
            background: rgba(255,215,0,0.1);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .card .url { font-size: 11px; color: #666; word-break: break-all; margin-bottom: 10px; }
        .card .fields { font-size: 11px; color: #888; }
        .card .fields span {
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 3px;
            margin: 2px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌐 数据源库</h1>
        <a href="index.html" class="back-btn">← 返回首页</a>
    </div>
    
    <div class="container">
        <div class="stats-row">
            <div class="stat-box">
                <div class="value">105</div>
                <div class="label">数据源总数</div>
            </div>
            <div class="stat-box">
                <div class="value">38</div>
                <div class="label">分类数</div>
            </div>
            <div class="stat-box">
                <div class="value">92</div>
                <div class="label">活跃数据源</div>
            </div>
            <div class="stat-box">
                <div class="value">13</div>
                <div class="label">已封禁</div>
            </div>
        </div>
        
        <div class="search-box">
            <input type="text" placeholder="搜索数据源..." oninput="filterDatasources()">
        </div>
        
        <div class="filter-row" id="filterRow">
            <span class="filter-btn active" data-filter="all">全部</span>
            <span class="filter-btn" data-filter="电商购物">电商购物</span>
            <span class="filter-btn" data-filter="招聘求职">招聘求职</span>
            <span class="filter-btn" data-filter="房产">房产</span>
            <span class="filter-btn" data-filter="汽车">汽车</span>
            <span class="filter-btn" data-filter="金融数据">金融数据</span>
            <span class="filter-btn" data-filter="新闻资讯">新闻资讯</span>
            <span class="filter-btn" data-filter="社交媒体">社交媒体</span>
            <span class="filter-btn" data-filter="视频网站">视频网站</span>
            <span class="filter-btn" data-filter="企业信息">企业信息</span>
            <span class="filter-btn" data-filter="政务公开">政务公开</span>
        </div>
        
        <div class="grid" id="datasourceGrid"></div>
    </div>
    
    <script>
        const datasources = [
            {name: "京东", category: "电商购物", url: "https://www.jd.com", fields: ["商品名称", "价格", "销量", "店铺"]},
            {name: "淘宝", category: "电商购物", url: "https://www.taobao.com", fields: ["商品名称", "价格", "店铺", "销量"]},
            {name: "天猫", category: "电商购物", url: "https://www.tmall.com", fields: ["商品名称", "价格", "店铺", "销量"]},
            {name: "拼多多", category: "电商购物", url: "https://www.pinduoduo.com", fields: ["商品名称", "价格", "销量"]},
            {name: "BOSS直聘", category: "招聘求职", url: "https://www.zhipin.com", fields: ["职位名", "公司名", "薪资", "地区"]},
            {name: "拉勾网", category: "招聘求职", url: "https://www.lagou.com", fields: ["职位名", "公司名", "薪资"]},
            {name: "智联招聘", category: "招聘求职", url: "https://www.zhaopin.com", fields: ["职位名", "公司名", "薪资", "地区"]},
            {name: "链家", category: "房产", url: "https://www.lianjia.com", fields: ["小区名", "总价", "单价", "面积", "户型"]},
            {name: "贝壳找房", category: "房产", url: "https://www.ke.com", fields: ["房源标题", "总价", "面积", "户型"]},
            {name: "瓜子二手车", category: "汽车", url: "https://www.guazi.com", fields: ["车型", "价格", "里程", "年份"]},
            {name: "汽车之家", category: "汽车", url: "https://www.autohome.com.cn", fields: ["车型", "厂商", "指导价", "级别"]},
            {name: "东方财富", category: "金融数据", url: "https://quote.eastmoney.com", fields: ["股票代码", "股票名称", "现价", "涨跌幅"]},
            {name: "雪球", category: "金融数据", url: "https://xueqiu.com", fields: ["股票代码", "股价", "市盈率", "市净率"]},
            {name: "微博热搜", category: "社交媒体", url: "https://s.weibo.com", fields: ["排名", "热搜词", "热度"]},
            {name: "知乎", category: "社交媒体", url: "https://www.zhihu.com", fields: ["问题", "回答数", "关注数"]},
            {name: "Bilibili", category: "视频网站", url: "https://www.bilibili.com", fields: ["视频标题", "UP主", "播放量", "点赞数"]},
            {name: "天眼查", category: "企业信息", url: "https://www.tianyancha.com", fields: ["公司", "法人", "注册资本", "成立日期"]},
            {name: "企查查", category: "企业信息", url: "https://www.qichacha.com", fields: ["公司", "法人", "注册资本", "地址"]},
            {name: "国家统计局", category: "政务公开", url: "https://data.stats.gov.cn", fields: ["指标", "数值", "时间", "地区"]},
            {name: "500彩票网", category: "竞彩数据", url: "https://www.500.com", fields: ["赛事", "主队", "客队", "赔率"]},
        ];
        
        let currentFilter = 'all';
        
        function renderDatasources(filter) {
            const grid = document.getElementById('datasourceGrid');
            let filtered = datasources;
            
            if (filter !== 'all') {
                filtered = datasources.filter(d => d.category === filter);
            }
            
            grid.innerHTML = filtered.map(d => `
                <div class="card">
                    <div class="name">${d.name}</div>
                    <div class="category">${d.category}</div>
                    <div class="url">${d.url}</div>
                    <div class="fields">
                        ${d.fields.map(f => `<span>${f}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderDatasources(currentFilter);
            });
        });
        
        function filterDatasources() {
            const search = document.querySelector('.search-box input').value.toLowerCase();
            const grid = document.getElementById('datasourceGrid');
            let filtered = datasources;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(d => d.category === currentFilter);
            }
            
            if (search) {
                filtered = filtered.filter(d => 
                    d.name.toLowerCase().includes(search) ||
                    d.category.toLowerCase().includes(search) ||
                    d.url.toLowerCase().includes(search)
                );
            }
            
            grid.innerHTML = filtered.map(d => `
                <div class="card">
                    <div class="name">${d.name}</div>
                    <div class="category">${d.category}</div>
                    <div class="url">${d.url}</div>
                    <div class="fields">
                        ${d.fields.map(f => `<span>${f}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        renderDatasources('all');
    </script>
</body>
</html>
